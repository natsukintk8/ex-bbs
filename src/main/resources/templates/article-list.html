<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form action="" th:action="@{/article/insert-article}" method="post">
    投稿者名：<input type="text" name="name"><br>
    投稿内容：<textarea name="content" id="" cols="30" rows="10"></textarea><br>
    <button>記事投稿</button>
    <hr>
</form>
<div th:each="article:${articleList}">
    投稿者名：<span th:text="${article.name}"></span><br>
    投稿内容：<br>
    <span th:text="${article.content}"></span>
    <form action="">
        <button>記事削除</button>
    </form>
    <div th:each="comment:${commentList}">
        コメント者名：<span th:text="${comment.name}"></span><br>
        コメント内容：<br>
        <span th:text="${comment.content}"></span>
    </div>
    <hr>
</div>
</body>
</html>
